version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Deferred/best-effort closes and test writers are idiomatic; the
      # library's IO helpers return read errors through their own paths.
      exclude-functions:
        - (*os.File).Close
        - fmt.Fprintln
        - fmt.Fprint
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
